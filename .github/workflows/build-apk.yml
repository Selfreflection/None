name: Compile Native APK without Gradle
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3

      - name: Manual Compilation Execution
        run: |
          # Create fresh working directories for the build blocks
          mkdir -p res/xml build/obj
          
          # Move your saved method.xml into the resource tree structure
          cp method.xml res/xml/
          
          # 1. Link resources and generate the R.java mapping file
          $ANDROID_HOME/build-tools/34.0.0/aapt2 compile res/xml/method.xml -o build/compiled_res.zip
          $ANDROID_HOME/build-tools/34.0.0/aapt2 link build/compiled_res.zip -I $ANDROID_HOME/platforms/android-34/android.jar --manifest AndroidManifest.xml --java build -o build/output_unsigned.apk
          
          # 2. Compile Java source to bytecode (including the freshly generated R.java file)
          javac -d build/obj -classpath $ANDROID_HOME/platforms/android-34/android.jar build/com/mycode/customkeyboard/R.java SimpleKeyboardService.java
          
          # 3. Convert Bytecode to Android Dex execution format using the modern D8 engine
          $ANDROID_HOME/build-tools/34.0.0/d8 --output build/ build/obj/com/mycode/customkeyboard/SimpleKeyboardService.class build/obj/com/mycode/customkeyboard/R.class build/obj/com/mycode/customkeyboard/R\$xml.class
          
          # 4. Inject the compiled dex bytecode file straight into the final APK container
          cd build
          zip -g output_unsigned.apk classes.dex
          
      - name: Export Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Native-NoGradle-Extension
          path: build/output_unsigned.apk
          $ANDROID_HOME/build-tools/34.0.0/aapt package -f -M AndroidManifest.xml -S build/apk/res -I $ANDROID_HOME/platforms/android-34/android.jar -F build/output.apk build/apk
          
      - name: Export Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Native-NoGradle-Extension
          path: build/output.apk
