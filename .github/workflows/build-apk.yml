name: Compile Native APK without Gradle
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3

      - name: Manual Compilation Execution
        run: |
          mkdir -p build/gen build/obj build/apk/res/xml
          
          # Move metadata files into alignment
          cp method.xml build/apk/res/xml/
          
          # 1. Compile resource tables
          $ANDROID_HOME/build-tools/34.0.0/aapt package -f -m -J build/gen -S build/apk/res -M AndroidManifest.xml -I $ANDROID_HOME/platforms/android-34/android.jar
          
          # 2. Compile Java Source to Bytecode
          javac -d build/obj -classpath $ANDROID_HOME/platforms/android-34/android.jar build/gen/com/mycode/customkeyboard/R.java SimpleKeyboardService.java
          
          # 3. Convert Bytecode to Android Dex Execution Machine format
          $ANDROID_HOME/build-tools/34.0.0/dx --dex --output=build/apk/classes.dex build/obj
          
          # 4. Package everything into a raw APK container
          $ANDROID_HOME/build-tools/34.0.0/aapt package -f -M AndroidManifest.xml -S build/apk/res -I $ANDROID_HOME/platforms/android-34/android.jar -F build/output.apk build/apk
          
      - name: Export Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Native-NoGradle-Extension
          path: build/output.apk
